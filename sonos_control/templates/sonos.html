{% extends 'base.html' %}
{% load static %}

{% block title %}Sonos Control{% endblock %}

{% block content %}
<style>
    /* ── Page layout ── */
    .sonos-page {
        background-color: #000;
    }

    .sonos-content,
    .spotify-content {
        height: calc(100vh - 62px);
        overflow-y: auto;
        padding-bottom: 20px;
        -webkit-overflow-scrolling: touch;
    }

    /* ── Speaker tabs ── */
    /* ── Speaker tabs ── */
    #speaker-tabs {
        background-color: #333;
        border-radius: 10px;
        padding: 8px;
    }

    #speaker-tabs .nav-link {
        color: #ccc;
        text-align: center;
        padding: 10px 12px;
        margin-bottom: 4px;
        border-radius: 8px;
        border: none;
    }

    #speaker-tabs .nav-link:hover {
        color: #fff;
        background-color: #444;
    }

    #speaker-tabs .nav-link.active {
        color: #fff;
        background-color: #007bff;
        border: none;
    }

    .tab-content {
        padding: 20px;
        border-radius: 10px;
        background-color: #fff;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* ── Album art & play/pause ── */
    .album-art-container {
        width: 100%;
        height: 300px;
        overflow: hidden;
    }

    .album-art {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;
    }

    .play-pause-btn {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background-color: rgba(0, 0, 0, 0.5);
        color: white;
        font-size: 4rem;
        display: flex;
        justify-content: center;
        align-items: center;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    /* ── Volume controls ── */
    .volume-btn {
        background-color: transparent;
        border: none;
        color: #007bff;
        font-size: 24px;
        max-width: 15%;
        cursor: pointer;
    }

    .volume-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 60%;
        height: 25px;
        background: #ddd;
        border-radius: 10px;
        outline: none;
        opacity: 0.7;
        transition: opacity 0.15s ease-in-out;
    }

    .volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        background: #007bff;
        cursor: pointer;
    }

    .volume-slider::-moz-range-thumb {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        background: #007bff;
        cursor: pointer;
    }

    .output {
        margin-left: 15px;
        font-size: 1.4rem;
    }

    /* ── Group button ── */
    .group-btn:disabled {
        background-color: #aaa;
        cursor: not-allowed;
    }

    /* ── Modal ── */
    .blur-background {
        filter: blur(5px);
        transition: filter 0.3s ease;
    }

    .tab-content .modal-dialog {
        border-radius: 25px;
        top: 100px;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
        z-index: 1050;
    }

    /* ── Queue ── */
    .queue-list {
        max-height: 25vh;
        overflow-y: auto;
        margin-top: 20px;
        border-radius: 10px;
        padding-left: 0;
        margin-left: 0;
    }

    .queue-list::-webkit-scrollbar {
        width: 12px;
    }

    .queue-list::-webkit-scrollbar-thumb {
        background-color: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
    }

    .queue-list::-webkit-scrollbar-track {
        background-color: rgba(0, 0, 0, 0.1);
    }

    .queue-list .list-group-item {
        padding-left: 0;
        cursor: pointer;
    }

    .queue-album-art {
        width: 60px;
        height: 60px;
        border-radius: 5px;
        object-fit: cover;
    }

    /* ── Audio visualizer ── */
    .audio-visualizer {
        display: flex;
        flex-direction: row;
        align-items: flex-end;
        justify-content: space-between;
        width: 50px;
        height: 30px;
        padding: 2px;
        box-sizing: border-box;
    }

    .audio-visualizer.hidden {
        display: none;
    }

    .audio-visualizer .bar {
        flex: none;
        flex-shrink: 0;
        width: 6px;
        height: 10px;
        background: #dc3545;
        animation: bounce 1s infinite ease-in-out alternate;
    }

    .audio-visualizer .bar:nth-child(2) { animation-delay: 0.2s; }
    .audio-visualizer .bar:nth-child(3) { animation-delay: 0.4s; }
    .audio-visualizer .bar:nth-child(4) { animation-delay: 0.6s; }
    .audio-visualizer .bar:nth-child(5) { animation-delay: 0.8s; }

    @keyframes bounce {
        0%   { transform: scaleY(1); }
        50%  { transform: scaleY(2); }
        100% { transform: scaleY(1); }
    }
</style>

<div class="container-fluid sonos-page">
    <div class="row">
        <div class="col-md-4 sonos-content">
            {% include "partials/sonos_speakers.html" %}
        </div>
        <div class="col-md-8 spotify-content">
            {% include "partials/spotify.html" %}
        </div>
    </div>
</div>

<script>
const modalInstances = {};
const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
let socket = null;
let activeSpeaker = null;

document.addEventListener("DOMContentLoaded", function () {
    initWebSocket();
});

/* ── WebSocket ── */
function initWebSocket() {
    if (!socket || socket.readyState === WebSocket.CLOSED) {
        socket = new WebSocket(wsScheme + '://' + window.location.host + '/ws/sonos_updates/');

        socket.onopen  = () => console.log('WebSocket connection opened');
        socket.onclose = () => console.log('WebSocket connection closed');
        socket.onerror = (e) => console.error('WebSocket Error:', e);

        socket.onmessage = function (event) {
            const data = JSON.parse(event.data);

            if (data.type === 'response') {
                if (data.action === 'volume') {
                    console.log('Volume update response:', data);
                } else if (data.action === 'play' || data.action === 'pause') {
                    handlePlayPauseResponse(event);
                } else if (data.action === 'play_track') {
                    console.log('Play track response:', data);
                } else if (data.action === 'clear_queue') {
                    console.log('Clear queue response:', data);
                } else {
                    console.warn('Unhandled WebSocket response:', data);
                }
            } else if (data.type === 'speaker_update') {
                updateSpeakerData(data.speaker_data);
            } else {
                console.warn('Unhandled WebSocket message:', data);
            }
        };
    }
}

/* ── Play / Pause ── */
function togglePlayPause(speakerUid, currentState) {
    const action = (currentState === 'PLAYING') ? 'pause' : 'play';
    if (!socket || socket.readyState !== WebSocket.OPEN) {
        console.error('WebSocket connection is not open');
        return;
    }
    socket.send(JSON.stringify({ speaker_uid: speakerUid, action: action }));
}

function handlePlayPauseResponse(response) {
    const data = JSON.parse(response.data);
    if (data.status === 'success') {
        const button = document.getElementById(`play-pause-button-${data.speaker_uid}`);
        const iconSpan = button.querySelector('.icon');
        if (data.action === 'play') {
            iconSpan.innerHTML = '&#10074;&#10074;';
            button.setAttribute('onclick', `togglePlayPause('${data.speaker_uid}', 'PLAYING')`);
        } else {
            iconSpan.innerHTML = '&#9654;';
            button.setAttribute('onclick', `togglePlayPause('${data.speaker_uid}', 'STOPPED')`);
        }
    } else {
        console.error('Failed to toggle play/pause state:', data.message);
    }
}

/* ── Queue ── */
function clearQueue(speakerUid) {
    if (!socket || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify({ speaker_uid: speakerUid, action: 'clear_queue' }));
}

function playTrack(speakerUid, trackIndex) {
    if (!socket || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify({ speaker_uid: speakerUid, track_index: trackIndex, action: 'play_track' }));
}

/* ── Volume ── */
function decreaseVolume(sliderId) {
    const slider = document.getElementById('volume-slider-' + sliderId);
    const newVolume = Math.max(parseInt(slider.value) - 10, 0);
    slider.value = newVolume;
    return newVolume;
}

function increaseVolume(sliderId) {
    const slider = document.getElementById('volume-slider-' + sliderId);
    const newVolume = Math.min(parseInt(slider.value) + 10, 100);
    slider.value = newVolume;
    return newVolume;
}

function adjustVolume(speakerUid, volume) {
    if (!socket || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify({ speaker_uid: speakerUid, volume: volume, action: 'volume' }));
}

/* ── Grouping modal ── */
function openModal(speakerUUID) {
    const tile = document.getElementById(`speaker-content-${speakerUUID}`);
    const modalElement = document.getElementById(`groupModal-${speakerUUID}`);

    if (!modalElement) {
        console.error(`Could not find the modal for speaker: ${speakerUUID}`);
        return;
    }

    const modal = new bootstrap.Modal(modalElement);
    modalInstances[speakerUUID] = modal;

    modalElement.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.setAttribute('data-original-state', cb.checked ? 'checked' : 'unchecked');
    });

    if (tile) tile.classList.add('blur-background');
    modal.show();
}

function onCheckboxChange(speakerUUID) {
    const checkboxes = document.querySelectorAll(`#groupModal-${speakerUUID} input[type="checkbox"]`);
    const applyButton = document.getElementById(`apply-button-${speakerUUID}`);
    let changed = false;

    checkboxes.forEach(cb => {
        if (cb.getAttribute('data-original-state') !== (cb.checked ? 'checked' : 'unchecked')) {
            changed = true;
        }
    });

    applyButton.disabled = !changed;
}

function applyGroupChanges(speakerUUID) {
    const csrfToken = document.querySelector('input[name="csrfmiddlewaretoken"]').value;
    const checkboxes = document.querySelectorAll(`#groupModal-${speakerUUID} input[type="checkbox"]`);
    const formData = new FormData();
    formData.append('speaker_uuid', speakerUUID);
    formData.append('action', 'toggle_group');
    formData.append('csrfmiddlewaretoken', csrfToken);

    checkboxes.forEach(cb => {
        const original = cb.getAttribute('data-original-state');
        const current = cb.checked ? 'checked' : 'unchecked';
        if (original !== current) {
            formData.append('target_speaker_uuid[]', cb.getAttribute('data-speaker-name'));
        }
    });

    fetch('toggle_group/', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
            if (data.status === 'success') {
                closeModal(speakerUUID);
            } else {
                console.error('Failed to update group:', data.message);
            }
        })
        .catch(err => console.error('Error:', err));
}

function closeModal(speakerUUID) {
    const tile = document.getElementById(`speaker-content-${speakerUUID}`);
    const modal = modalInstances[speakerUUID];

    if (modal) {
        modal.hide();
        delete modalInstances[speakerUUID];
    }
    if (tile) tile.classList.remove('blur-background');
}

/* ── Speaker data updates (via WebSocket) ── */
function updateSpeakerData(speakerData) {
    updateSpeakerTabs(speakerData);
    for (const id in speakerData) {
        updateSpeakerContent(id, speakerData[id]);
    }
    activateSpeakerTab(activeSpeaker);
}

function updateSpeakerTabs(speakerData) {
    const container = document.getElementById('speaker-tabs');
    container.innerHTML = '';

    let isFirst = true;
    for (const id in speakerData) {
        const tab = document.createElement('a');
        tab.classList.add('nav-link');
        tab.id = `speaker-tab-${id}`;
        tab.setAttribute('data-bs-toggle', 'tab');
        tab.href = `#speaker-content-${id}`;
        tab.setAttribute('role', 'tab');
        tab.setAttribute('aria-controls', `speaker-content-${id}`);
        tab.setAttribute('aria-selected', 'false');
        tab.textContent = speakerData[id].group_label;

        if ((activeSpeaker == null && isFirst) || activeSpeaker == id) {
            tab.classList.add('active');
            tab.setAttribute('aria-selected', 'true');
            if (activeSpeaker == null) activeSpeaker = id;
            isFirst = false;
        }

        tab.addEventListener('shown.bs.tab', function (e) {
            activeSpeaker = e.target.getAttribute('href').replace('#speaker-content-', '');
        });

        container.appendChild(tab);
    }
}

function updateSpeakerContent(speakerId, data) {
    let el = document.getElementById(`speaker-content-${speakerId}`);

    /* Create content dynamically if it doesn't exist yet */
    if (!el) {
        const tabContent = document.getElementById('speaker-tabContent');
        el = document.createElement('div');
        el.id = `speaker-content-${speakerId}`;
        el.classList.add('tab-pane', 'fade');
        el.setAttribute('role', 'tabpanel');
        el.setAttribute('aria-labelledby', `speaker-tab-${speakerId}`);

        el.innerHTML = `
            <div class="card mb-3">
                <div class="row no-gutters">
                    <div class="col-md-12">
                        <h2 class="mt-3 text-center">${data.group_label}</h2>
                        <div class="album-art-container position-relative">
                            <img src="${data.album_art || '{% static "default_album_art.webp" %}'}"
                                 class="img-fluid album-art" alt="Album Art"
                                 onerror="this.onerror=null;this.src='{% static "default_album_art.webp" %}';">
                            <button class="btn play-pause-btn position-absolute"
                                    id="play-pause-button-${speakerId}"
                                    onclick="togglePlayPause('${speakerId}', '${data.play_state}')">
                                <span class="icon">
                                    ${data.play_state === 'PLAYING' ? '&#10074;&#10074;' : '&#9654;'}
                                </span>
                            </button>
                            <div class="audio-visualizer position-absolute top-0 end-0 rounded p-1${data.play_state !== 'PLAYING' ? ' hidden' : ''}"
                                 id="audio-visualizer-${speakerId}">
                                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                                <div class="bar"></div><div class="bar"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <h5 class="track-title"><strong>Title:</strong> ${data.track}</h5>
                        <p class="track-artist"><strong>Artist:</strong> ${data.artist}</p>
                        <p class="track-album"><strong>Album:</strong> ${data.album}</p>
                    </div>
                    <div class="col-md-9">
                        <button class="volume-btn volume-down"
                                onclick="adjustVolume('${speakerId}', decreaseVolume('${speakerId}'))">
                            <i class="fas fa-volume-down"></i>
                        </button>
                        <input type="range" class="volume-slider" min="0" max="100"
                               value="${data.volume}" id="volume-slider-${speakerId}"
                               onchange="adjustVolume('${speakerId}', this.value)">
                        <button class="volume-btn volume-up"
                                onclick="adjustVolume('${speakerId}', increaseVolume('${speakerId}'))">
                            <i class="fas fa-volume-up"></i>
                        </button>
                    </div>
                    <div class="col-md-3">
                        <button onclick="openModal('${speakerId}')" class="btn btn-success">Group</button>
                    </div>
                </div>
                <hr class="my-4">
                <div class="queue-container">
                    <div class="d-flex justify-content-between">
                        <h5 class="d-inline">Queue:</h5>
                        <button class="btn btn-danger btn-sm" onclick="clearQueue('${speakerId}')">Clear Queue</button>
                    </div>
                    <ul class="queue-list list-group"></ul>
                </div>
            </div>`;
        tabContent.appendChild(el);
    }

    /* Update existing content */
    const groupLabel = el.querySelector('h2.text-center');
    if (groupLabel) groupLabel.innerText = data.group_label;

    const albumArt = el.querySelector('.album-art');
    if (albumArt) albumArt.src = data.album_art || '{% static "default_album_art.webp" %}';

    const playBtn = document.getElementById(`play-pause-button-${speakerId}`);
    if (playBtn) {
        const icon = playBtn.querySelector('.icon');
        icon.innerHTML = data.play_state === 'PLAYING' ? '&#10074;&#10074;'
                       : data.play_state === 'PAUSED_PLAYBACK' ? '&#9654;'
                       : icon.innerHTML;
        playBtn.setAttribute('onclick', `togglePlayPause('${speakerId}', '${data.play_state}')`);
    }

    const visualizer = document.getElementById(`audio-visualizer-${speakerId}`);
    if (visualizer) {
        visualizer.classList.toggle('hidden', data.play_state !== 'PLAYING');
    }

    const titleEl  = el.querySelector('.track-title strong');
    const artistEl = el.querySelector('.track-artist strong');
    const albumEl  = el.querySelector('.track-album strong');
    if (titleEl)  titleEl.nextSibling.textContent  = ` ${data.track}`;
    if (artistEl) artistEl.nextSibling.textContent = ` ${data.artist}`;
    if (albumEl)  albumEl.nextSibling.textContent  = ` ${data.album}`;

    const volumeSlider = document.getElementById(`volume-slider-${speakerId}`);
    if (volumeSlider) volumeSlider.value = data.volume;

    /* Update queue */
    const queueList = el.querySelector('.queue-list');
    queueList.innerHTML = '';

    if (data.queue && data.queue.length > 0) {
        data.queue.forEach((track, index) => {
            const li = document.createElement('li');
            li.classList.add('list-group-item');
            li.setAttribute('onclick', `playTrack('${speakerId}', ${index})`);
            li.innerHTML = `
                <div class="row align-items-center">
                    <div class="col-auto">
                        <img src="${track.album_art || '{% static "default_album_art.webp" %}'}"
                             class="img-fluid queue-album-art" alt="Album Art">
                    </div>
                    <div class="col">
                        <h6 class="mb-1">${track.title}</h6>
                        <p class="mb-0">${track.artist}</p>
                    </div>
                </div>`;
            queueList.appendChild(li);
        });
    } else {
        const li = document.createElement('li');
        li.classList.add('list-group-item', 'text-center');
        li.textContent = 'No tracks in the queue';
        queueList.appendChild(li);
    }
}

function activateSpeakerTab(speakerId) {
    const activeTab = document.querySelector('#speaker-tabs .nav-link.active');
    const activePane = document.querySelector('.tab-pane.show.active');

    if (activeTab) { activeTab.classList.remove('active'); activeTab.setAttribute('aria-selected', 'false'); }
    if (activePane) { activePane.classList.remove('show', 'active'); }

    const newTab  = document.getElementById(`speaker-tab-${speakerId}`);
    const newPane = document.getElementById(`speaker-content-${speakerId}`);

    if (newTab)  { newTab.classList.add('active');  newTab.setAttribute('aria-selected', 'true'); }
    if (newPane) { newPane.classList.add('show', 'active'); }
}
</script>
{% endblock %}
